name: Branch Sync Check
on:
  pull_request:
jobs:
  check-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0  # Fetch all history
          
      - name: Fetch base branch
        run: |
          git fetch origin ${{ github.base_ref }}
          
      - name: Check if branch is up to date
        run: |
          # Get commits to compare
          MERGE_BASE=$(git merge-base HEAD origin/${{ github.base_ref }})
          TARGET_LATEST=$(git rev-parse origin/${{ github.base_ref }})
          
          echo "Common ancestor: $MERGE_BASE"
          echo "Target branch latest: $TARGET_LATEST"
          
          if [ "$MERGE_BASE" != "$TARGET_LATEST" ]; then
            echo "❌ Branch is out of sync with ${{ github.base_ref }}"
            echo "Please update your branch before merging."
            exit 1
          else
            echo "✅ Branch is up to date with ${{ github.base_ref }}"
          fi
